name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  # dockg depends on docmeta via file:../docmeta. The dockg:frontmatter:0.1
  # built-in currently lives on this docmeta branch; switch to `main` once it
  # merges there.
  DOCMETA_REF: feat/docevals-builtin-schema

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          path: dockg
      - uses: actions/checkout@v7
        with:
          repository: hawkeyexl/docmeta
          ref: ${{ env.DOCMETA_REF }}
          path: docmeta
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dockg/package-lock.json

      # The file:../docmeta dependency needs docmeta built first.
      - run: npm ci
        working-directory: docmeta
      - run: npm run build
        working-directory: docmeta

      - run: npm ci
        working-directory: dockg
      - run: npm run typecheck
        working-directory: dockg
      - run: npm run build
        working-directory: dockg
      - run: npm test
        working-directory: dockg

      # Determinism gate: byte-identical output is the product contract.
      - name: Determinism gate
        working-directory: dockg/test/fixtures/corpus
        run: |
          node ../../../dist/cli.js build --out /tmp/gate-a.ttl
          node ../../../dist/cli.js build --out /tmp/gate-b.ttl
          cmp /tmp/gate-a.ttl /tmp/gate-b.ttl
          cmp /tmp/gate-a.ttl ../golden/graph.ttl
