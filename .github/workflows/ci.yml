name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # npm install, not ci: the committed lock is generated on Windows and
      # omits the Linux-side optional deps of @napi-rs/wasm-runtime
      # (@emnapi/core, @emnapi/runtime), which rolldown's wasm binding pulls
      # in — a strict lock check can't be satisfied on both platforms.
      - run: npm install
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      # Determinism gate: byte-identical output is the product contract.
      # (Golden comparison normalizes the dockg:version literal so release
      # version bumps don't invalidate it.)
      - name: Determinism gate
        working-directory: test/fixtures/corpus
        run: |
          node ../../../dist/cli.js build --out /tmp/gate-a.ttl
          node ../../../dist/cli.js build --out /tmp/gate-b.ttl
          cmp /tmp/gate-a.ttl /tmp/gate-b.ttl
          sed 's/dockg:version "[^"]*"/dockg:version "X"/' /tmp/gate-a.ttl > /tmp/gate-a-norm.ttl
          sed 's/dockg:version "[^"]*"/dockg:version "X"/' ../golden/graph.ttl > /tmp/golden-norm.ttl
          cmp /tmp/gate-a-norm.ttl /tmp/golden-norm.ttl
