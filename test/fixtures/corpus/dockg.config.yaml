version: 1
baseIri: https://example.com/kg/
inputs:
  - "docs/**/*.md"
out: graph.ttl
provenance:
  # Pinned off, deliberately (ADR 01010). The golden is the derivation
  # regression gate, not a capture of this repo's commit state: under the
  # shipped default ("auto") the build activity would carry HEAD's committer
  # date in prov:endedAtTime, and the golden would fail on every commit.
  # Git-derived provenance is covered by the temp-repo tests in
  # test/integration/build.test.ts instead.
  git: false
